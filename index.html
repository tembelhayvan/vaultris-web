<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaultris — Grid Skipping Puzzle</title>
<meta name="description" content="A minimalist grid puzzle game. 100 levels, 4 modes, fully offline. Available on iOS and Android.">

<meta property="og:title" content="Vaultris — Grid Skipping Puzzle">
<meta property="og:description" content="A quiet puzzle game. 100 levels, 4 modes, no ads.">
<meta property="og:type" content="website">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #3B2E7A 0%, #1A1238 60%, #0F0A1E 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .container { max-width: 480px; width: 100%; text-align: center; }
  .icon {
    width: 120px; height: 120px; margin: 0 auto 24px;
    border-radius: 28px; overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }
  .icon img { width: 100%; height: 100%; display: block; }
  h1 {
    font-size: 56px; font-weight: 800;
    background: linear-gradient(90deg, #7AB8F5 0%, #FFCE5C 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .tagline { color: #C8BEE6; font-size: 18px; margin-bottom: 32px; }
  .features {
    color: #A096C5; font-size: 14px;
    margin-bottom: 40px; line-height: 1.7;
  }
  .stores { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
  .store-btn {
    display: block; padding: 16px 24px;
    border-radius: 12px; text-decoration: none;
    font-weight: 600; font-size: 16px;
    transition: transform 0.15s, opacity 0.15s;
  }
  .store-btn:hover { transform: translateY(-2px); opacity: 0.9; }
  .ios { background: #000; color: #fff; border: 1px solid #444; }
  .android { background: #4A90D9; color: #fff; }
  .footer {
    margin-top: 60px; color: #6B5F8E;
    font-size: 12px; line-height: 1.8;
  }
  .footer a { color: #A096C5; text-decoration: none; }
  .footer a:hover { color: #fff; }
  .loading {
    display: none; color: #A096C5;
    font-size: 14px; margin-top: 16px;
  }
  .loading.visible { display: block; }
</style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <img src="vaultris-icon.png" alt="Vaultris" onerror="this.style.display='none'">
    </div>
    <h1>VAULTRIS</h1>
    <p class="tagline">Grid skipping puzzle</p>
    <p class="features">
      100 handcrafted levels &middot; 4 game modes<br>
      Daily challenge &middot; No ads &middot; Fully offline
    </p>
    <div class="stores">
      <a href="https://apps.apple.com/app/vaultris/idCHANGEME" class="store-btn ios" id="ios-link">
        Download on the App Store
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.garajprojeleri.vaultris" class="store-btn android" id="android-link">
        Get it on Google Play
      </a>
    </div>
    <p class="loading" id="loading">Redirecting to store...</p>
    <div class="footer">
      &copy; 2026 Garaj Projeleri<br>
      <a href="https://garajprojeleri.neocities.org/privacy.html">Privacy Policy</a>
    </div>
  </div>

<script>
  (function() {
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var iosLink = document.getElementById('ios-link').href;
    var androidLink = document.getElementById('android-link').href;
    var loading = document.getElementById('loading');

    function redirect(url) {
      loading.classList.add('visible');
      setTimeout(function() {
        window.location.href = url;
      }, 800);
    }

    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
      redirect(iosLink);
      return;
    }

    if (/android/i.test(ua)) {
      redirect(androidLink);
      return;
    }
  })();
</script>
</body>
</html>
